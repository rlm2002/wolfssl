name: MSYS2 Build Test

# START OF COMMON SECTION
on:
  push:
    branches: [ 'msys2' ]
  # pull_request:
  #   branches: [ '*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
# END OF COMMON SECTION

jobs:
  msys2-ucrt64:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v3
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: git gcc autotools base-devel autoconf netcat
      - name: configure wolfSSL
        run: ./autogen.sh && ./configure --enable-all --disable-crl-monitor CFLAGS="-DUSE_CERT_BUFFERS_2048 -DUSE_CERT_BUFFERS_256"
      - name: build wolfSSL
        run: pwd && ls && make check
      - name: Display log
        if: always()
        run: cat test-suite.log
